volumes:
  plextraktsync:

services:

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    hostname: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=public
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/Docker/Apps/Plex:/config
      - /mnt/Abyss/Media:/media:rslave
      - /altmount:/altmount:rslave
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --connect-timeout 15 --silent --show-error --fail http://localhost:32400/identity || exit 1"]
      interval: 60s
      retries: 3
      start_period: 60s
      timeout: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    hostname: tautulli
    restart: unless-stopped
    networks:
      - bunni_network
    depends_on:
      plex:
        condition: service_healthy
        required: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/Docker/Apps/Tautulli:/config
      - "/mnt/Docker/Apps/Plex/Library/Application Support/Plex Media Server/Logs:/plex_logs"
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 20042:8181
    healthcheck:
      test: ["CMD-SHELL", "curl -ILfks https://localhost:8181/status > /dev/null || curl -ILfs http://localhost:8181/status > /dev/null || exit 1"]
      interval: 10s
      retries: 3
      start_period: 90s
      timeout: 10s

  plexautolanguages:
    image: ghcr.io/journeydocker/plex-auto-languages:main
    container_name: plexautolanguages
    hostname: plexautolanguages
    restart: unless-stopped
    networks:
      - bunni_network
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/Docker/Apps/PlexAutoLanguages/config:/config
      - /mnt/Docker/Apps/PlexAutoLanguages/logs:/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  plexanibridge:
    image: ghcr.io/anibridge/anibridge:experimental
    container_name: plexanibridge
    hostname: plexanibridge
    restart: unless-stopped
    networks:
      - bunni_network
    depends_on:
      plex:
        condition: service_healthy
        required: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/Docker/Apps/PlexAniBridge/data:/config
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 21033:4848
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4848/readyz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 160s

  plextraktsync:
    image: ghcr.io/journeydocker/plextraktsync:main
    container_name: plextraktsync
    hostname: plextraktsync
    restart: on-failure:2
    networks:
      - bunni_network
    depends_on:
      plex:
        condition: service_healthy
        required: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/Docker/Apps/PlexTraktSync:/app/config
      - plextraktsync:/app/xdg
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "config/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 10s
    command: ["watch"]

  plextrakrsync:
    image: ghcr.io/journeydocker/plextrakrsync:dev
    container_name: plextrakrsync
    hostname: plextrakrsync
    restart: unless-stopped
    networks:
      - bunni_network
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WETRAKR_TARGET_URL=${WETRAKR_TARGET_URL}
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - ALLOWED_PLEX_USER=${ALLOWED_PLEX_USER}
      - SCROBBLE_THRESHOLD=${SCROBBLE_THRESHOLD}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  tunarr:
    image: ghcr.io/chrisbenincasa/tunarr:1.2.15
    container_name: tunarr
    hostname: tunarr
    restart: unless-stopped
    networks:
      - bunni_network
    depends_on:
      plex:
        condition: service_healthy
        required: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/Docker/Apps/Tunarr/config:/config/tunarr
      - /mnt/Docker/Apps/Tunarr/cache:/home/tunarr/.cache
      - /mnt/Abyss/Media:/media:rslave
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 20055:8000
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  omniscan:
    image: ghcr.io/drondeseries/omniscan:latest
    container_name: omniscan
    hostname: omniscan
    restart: unless-stopped
    networks:
      - bunni_network
    command: python -m omniscan_pkg.main --watch
    depends_on:
      plex:
        condition: service_healthy
        required: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/Docker/Apps/OmniScan/config:/app/config
      - /altmount:/altmount:rslave
      - /mnt/Abyss/Media:/media:rslave
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 21042:8000

networks:
  bunni_network:
    external: true
